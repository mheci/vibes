name: Build ISO

on:
  workflow_run:
    workflows: [bluebuild]
    # Only follow builds that ran on the default branch. Prevents wasted
    # ISO builds (of the stale `latest` tag) after PR/other-branch builds.
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build-iso:
    name: Build ISO
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: jlumbroso/free-disk-space@v1.3.1 # SHA-identical to @main at pin time
        with:
          tool-cache: true
          large-packages: true
          docker-images: false

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.5.0 # SHA-identical to @main at pin time
        id: build
        with:
          arch: x86_64
          image_name: vibes
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 44
          variant: Silverblue
          iso_name: vibes-latest.iso
          secure_boot_key_url: ''
          enrollment_password: ''

      - name: Verify ISO checksum
        run: |
          set -euo pipefail
          dir="${{ steps.build.outputs.iso_path }}"
          iso="${{ steps.build.outputs.iso_name }}"
          echo "Verifying ${iso} against its published checksum…"
          sum_now="$(sha256sum "${dir}/${iso}" | awk '{print $1}')"
          sum_ref="$(grep -Eo '[0-9a-f]{64}' "${dir}/${iso}-CHECKSUM" | head -n1 || true)"
          if [[ -z "$sum_ref" ]]; then
            echo "::error::could not extract a sha256 from ${iso}-CHECKSUM"
            exit 1
          fi
          if [[ "$sum_now" != "$sum_ref" ]]; then
            echo "::error::checksum mismatch: computed ${sum_now}, expected ${sum_ref}"
            exit 1
          fi
          echo "Checksum OK: ${sum_now}"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: vibes-iso
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
