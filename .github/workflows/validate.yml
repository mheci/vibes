name: validate-image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Optional image reference to validate (defaults to ghcr.io/<owner>/<repo>:latest)"
        required: false
        type: string
  schedule:
    - cron: "37 09 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.image || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-image:
    name: Resolve image reference
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Resolve image reference
        id: resolve
        run: |
          set -euo pipefail
          INPUT_IMAGE="${{ github.event.inputs.image || '' }}"
          if [[ -n "${INPUT_IMAGE}" ]]; then
            IMAGE="${INPUT_IMAGE}"
          else
            IMAGE="ghcr.io/${GITHUB_REPOSITORY}:latest"
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Validating image: ${IMAGE}"

  kvm-boot-validation:
    name: KVM qcow2 boot + in-VM QA
    runs-on: ubuntu-latest
    needs: resolve-image
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install KVM and bootc image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-system-x86 qemu-utils ovmf jq openssh-client
          test -e /dev/kvm
          sudo chmod 666 /dev/kvm || true

      - name: Boot image in QEMU/KVM and run automated QA
        env:
          IMAGE: ${{ needs.resolve-image.outputs.image }}
          WORKDIR: ${{ github.workspace }}/kvm-boot-work
          TIMEOUT_SECONDS: "900"
          MEMORY_MB: "8192"
          VCPUS: "4"
        run: scripts/ci/kvm-boot-test.sh

      - name: Upload KVM boot logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kvm-boot-logs
          path: |
            kvm-boot-work/*.log
            kvm-boot-work/vibes-qa/**
          if-no-files-found: warn
