name: validate-image

on:
  workflow_run:
    workflows: [bluebuild]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "37 09 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  static-validation:
    name: Static bootc/container validation
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo podman jq

      - name: Inspect image manifest
        run: |
          skopeo inspect docker://${IMAGE} | jq '{Name, Digest, Created, Labels}'

      - name: Verify cosign signature
        uses: sigstore/cosign-installer@v3
      - name: cosign verify
        run: cosign verify --key cosign.pub ${IMAGE}

      - name: bootc container lint
        run: |
          podman run --rm --privileged --pull=always --entrypoint /usr/bin/bootc ${IMAGE} container lint

      - name: Container filesystem smoke checks
        run: |
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /usr/bin/brave-browser \
            /usr/sbin/bpftune \
            /usr/bin/kitty \
            /usr/bin/pcmanfm-qt \
            /usr/bin/code \
            /usr/bin/zed \
            /usr/bin/lact \
            /usr/bin/scx_lavd \
            /usr/bin/opencode \
            /usr/lib/vibes-apps/lmstudio/LM_Studio.AppImage \
            /usr/lib/vibes-apps/vicinae/vicinae.AppImage \
            /usr/lib64/ladspa/librnnoise_ladspa.so \
            /etc/pipewire/pipewire.conf.d/99-input-denoising.conf
          podman run --rm --pull=always --entrypoint /usr/bin/rpm ${IMAGE} -q brave-origin
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /usr/bin/firefox || \
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /usr/lib64/firefox/firefox
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /etc/systemd/system/multi-user.target.wants/bpftune.service
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /etc/scx_loader/config.toml || \
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE} \
            /usr/lib/systemd/system/scx-lavd.service

  kvm-boot-validation:
    name: KVM qcow2 boot validation
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install KVM and bootc image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-system-x86 qemu-utils ovmf jq
          test -e /dev/kvm
          sudo chmod 666 /dev/kvm || true

      - name: Boot image in QEMU/KVM and scan serial console
        env:
          IMAGE: ${{ env.IMAGE }}
          WORKDIR: ${{ github.workspace }}/kvm-boot-work
          TIMEOUT_SECONDS: "900"
          MEMORY_MB: "8192"
          VCPUS: "4"
        run: scripts/ci/kvm-boot-test.sh

      - name: Upload KVM boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kvm-boot-logs
          path: |
            kvm-boot-work/*.log
            kvm-boot-work/config.toml
          if-no-files-found: warn

  security-scan:
    name: Trivy CVE/security scan
    runs-on: ubuntu-latest
    needs: static-validation
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CVE scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
