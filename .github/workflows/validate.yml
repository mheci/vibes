name: validate-image

on:
  workflow_run:
    workflows: [bluebuild]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "37 09 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  validate:
    name: Validate published bootc image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo podman jq

      - name: Inspect image manifest
        run: |
          skopeo inspect docker://${IMAGE} | jq '{Name, Digest, Created, Labels}'

      - name: Verify cosign signature
        uses: sigstore/cosign-installer@v3
      - run: cosign verify --key cosign.pub ${IMAGE}

      - name: bootc container lint
        run: |
          podman run --rm --privileged --pull=always --entrypoint /usr/bin/bootc ${IMAGE} container lint

      - name: Runtime smoke checks
        run: |
          # Avoid invoking rpm-ostree-aware shell/profile logic in a non-booted container.
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE}             /usr/bin/firefox             /usr/bin/brave-browser             /usr/bin/kitty             /usr/bin/pcmanfm-qt             /usr/bin/code             /usr/local/bin/zed             /usr/bin/lact             /usr/bin/scx_lavd             /usr/local/bin/opencode             /opt/lmstudio/LM_Studio.AppImage             /opt/vicinae/vicinae.AppImage             /usr/local/lib/ladspa/librnnoise_ladspa.so             /etc/pipewire/pipewire.conf.d/99-input-denoising.conf
          podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE}             /etc/scx_loader/config.toml ||           podman run --rm --pull=always --entrypoint /usr/bin/stat ${IMAGE}             /usr/lib/systemd/system/scx-lavd.service

      - name: CVE scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
