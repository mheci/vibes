---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
version: 1
# image will be published to ghcr.io/mheci/vibes
name: vibes
description: Bazzite NVIDIA Open gaming, media, AI workstation, and KDE theming image built with BlueBuild.

# Publish builds to a non-user-facing candidate tag first.
# The GitHub Actions pipeline promotes only validated digests to stable/latest.
alt-tags:
  - candidate

# Track the latest Bazzite NVIDIA-open image as requested.
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  - type: script
    scripts:
      - setup-repos-and-rpms.sh
      - install-latest-apps.sh
      - install-themes-and-assets.sh

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
      - scope: user

  - type: files
    files:
      - source: system
        destination: /

  # Keep signed-image policy support after all customizations.
  - type: signing

  # bootc-recommended sanity checks at image build time.
  - type: containerfile
    snippets:
      - RUN bootc container lint
