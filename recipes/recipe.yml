---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
version: 1
# image will be published to ghcr.io/mheci/vibes
name: vibes
description: Bazzite NVIDIA Open gaming, media, and AI workstation image built with BlueBuild.

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  # Configure repositories and install RPM packages
  - type: script
    scripts:
      - setup-repos-and-rpms.sh

  # Install latest versions of applications from upstream
  - type: script
    scripts:
      - install-latest-apps.sh

  # Install desktop themes and cursor packs
  - type: script
    scripts:
      - install-themes.sh

  # Configure default Flatpaks (installed at first boot)
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - net.waterfox.waterfox
          - org.gnome.Loupe
      - scope: user

  # Copy custom configuration files into the image
  - type: files
    files:
      - source: system
        destination: /

  # Run bootc container lint to validate image integrity
  - type: containerfile
    snippets:
      - RUN bootc container lint
