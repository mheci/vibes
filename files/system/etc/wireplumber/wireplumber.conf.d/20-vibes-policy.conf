wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
  device.routes.default-sink-volume = 0.80
  device.routes.default-source-volume = 0.75
}

# Gaming / media priority tweaks: keep USB audio and HDMI alive,
# prefer higher-quality profiles by default.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.*" }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = true
        api.acp.auto-profile = false
        api.acp.auto-port = false
        device.profile = "pro-audio"
      }
    }
  }
]

# Bluetooth: prefer high-quality A2DP codecs over HSP/HFP.
monitor.bluez.rules = [
  {
    matches = [
      { device.name = "~bluez_card.*" }
    ]
    actions = {
      update-props = {
        bluez5.auto-switch-profile = false
        bluez5.codecs = [ sbc aac aptx aptx_hd ldac ]
        device.profile = "a2dp-sink"
      }
    }
  }
]

# Node priorities: give game audio and voice chat reasonable priority.
# RNNoise source is handled separately in its own config file.
node.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*" }
    ]
    actions = {
      update-props = {
        priority.driver = 900
        priority.session = 900
      }
    }
  }
]
