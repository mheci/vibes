# Vibes gaming-focused WirePlumber policy.
# Ensures low-latency paths for common game/voice clients and OBS.

# Raise priority for common game audio clients so they don't get starved.
node.rules = [
  {
    matches = [
      { application.name = "~.*Steam.*" }
      { application.name = "~.*Discord.*" }
      { application.name = "~.*Mumble.*" }
      { application.name = "~.*TeamSpeak.*" }
      { application.name = "~.*OBS.*" }
      { application.name = "~.*firefox.*" }
      { application.name = "~.*brave.*" }
    ]
    actions = {
      update-props = {
        priority.session = 800
        node.pause-on-idle = false
        session.suspend-timeout-seconds = 0
      }
    }
  }
]

# Ensure capture nodes (microphones) stay alive for voice chat.
node.rules = [
  {
    matches = [
      { media.class = "Audio/Source" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        session.suspend-timeout-seconds = 0
      }
    }
  }
]

# Link policy: auto-connect everything by default for convenience.
link.policy = {
  auto-link = true
}
