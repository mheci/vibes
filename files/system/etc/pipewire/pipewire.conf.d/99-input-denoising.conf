# RNNoise virtual microphone using werman/noise-suppression-for-voice.
# Stereo label requested by image owner. Use "Vibes RNNoise Stereo Source" in apps.
context.modules = [
{ name = libpipewire-module-filter-chain
  args = {
    node.description = "Vibes RNNoise Stereo Source"
    media.name       = "Vibes RNNoise Stereo Source"
    filter.graph = {
      nodes = [
        {
          type   = ladspa
          name   = rnnoise
          plugin = /usr/local/lib/ladspa/librnnoise_ladspa.so
          label  = noise_suppressor_stereo
          control = {
            "VAD Threshold (%)"        = 70.0
            "VAD Grace Period (ms)"    = 200
            "Retroactive VAD Grace (ms)" = 0
          }
        }
      ]
    }
    capture.props = {
      node.name    = "capture.vibes_rnnoise_source"
      node.passive = true
      audio.rate   = 48000
      audio.channels = 2
    }
    playback.props = {
      node.name    = "vibes_rnnoise_source"
      media.class  = Audio/Source
      audio.rate   = 48000
      audio.channels = 2
    }
  }
}
]
