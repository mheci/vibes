# Vibes media/gaming PipeWire defaults.
# 48 kHz is required by RNNoise and is a safe baseline for games, Discord, OBS, and browsers.
# Quantum settings balance low latency (gaming) with stability (media production).
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 88200 96000 176400 192000 ]
    default.clock.quantum       = 1024
    default.clock.min-quantum   = 32
    default.clock.max-quantum   = 2048
    default.clock.quantum-limit = 8192
    # Disable unnecessary processing for lowest possible latency path
    link.max-buffers            = 16
    mem.warn-mlock              = false
    mem.allow-mlock             = true
    core.daemon                 = true
    core.name                   = pipewire-0
}

context.modules = [
    # Load the RT module with aggressive but safe priorities for gaming.
    { name = libpipewire-module-rt
      args = {
          nice.level    = -11
          rt.prio       = 88
          rt.time.soft  = 200000
          rt.time.hard  = 200000
      }
      flags = [ ifexists nofail ]
    }
]
