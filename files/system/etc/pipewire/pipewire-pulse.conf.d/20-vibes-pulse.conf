pulse.properties = {
    pulse.min.req          = 32/48000
    pulse.default.req      = 960/48000
    pulse.min.quantum      = 32/48000
    pulse.default.format   = F32
    pulse.default.position = [ FL FR ]
    # Allow apps to request lower latency without forcing it globally
    pulse.min.frag         = 32/48000
    pulse.default.frag     = 960/48000
}

stream.properties = {
    # 4 = PipeWire's default (best-sinc) quality. Lower values trade audible
    # artifacts for CPU savings we don't need on this hardware class.
    resample.quality   = 4
}
