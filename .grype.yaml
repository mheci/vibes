# Grype configuration for vibes image scanning
# See: https://github.com/anchore/grype#configuration

# Skip packages installed from these locations (build-time only)
exclude:
  - "/var/cache/**"
  - "/tmp/**"

# Ignore these specific CVEs (document why)
# Example:
# ignore:
#   - vulnerability: CVE-2023-XXXXX
#     reason: "Not exploitable in our use case because ..."

# Match packages by CPE
match:
  java:
    using-cpes: true
  python:
    using-cpes: true
  javascript:
    using-cpes: true

# Output configuration
log:
  level: info
  type: console
